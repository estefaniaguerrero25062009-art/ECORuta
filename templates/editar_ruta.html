<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ECORuta — Editar ruta</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="header">
    <h1>🌿 ECORuta — Editar ruta</h1>
    <div class="header-user">
      👤 <strong>{{ usuario }}</strong>
      <span class="badge-rol">{{ rol }}</span>
      <a href="/logout" class="btn-logout">Cerrar sesión</a>
    </div>
  </div>
  <div class="container">
    <h2>Editar ruta</h2>
    {% if error %}<p class="mensaje-error">{{ error }}</p>{% endif %}
    <form method="POST">
      <label>Nombre de la ruta:</label>
      <input type="text" name="nombre" value="{{ ruta.nombre }}" required>
      <label>Zona:</label>
      <input type="text" name="zona" value="{{ ruta.zona }}" required>
      <label>Horario:</label>
      <input type="text" name="horario" value="{{ ruta.horario }}" required>
      <!-- Corrección #8: colonias y calles -->
      <label>Colonias que atiende:</label>
      <input type="text" name="colonias" value="{{ ruta.colonias }}" required>
      <label>Frecuencia de recolección:</label>
      <input type="text" name="frecuencia" value="{{ ruta.frecuencia or '' }}">
      <label>Distancia aproximada (km):</label>
      <input type="number" step="0.1" name="distancia" value="{{ ruta.distancia or '' }}">
      <button type="submit">Guardar cambios</button>
    </form>
    <a class="back" href="/rutas">← Volver a rutas</a>
  </div>
</body>
</html>
