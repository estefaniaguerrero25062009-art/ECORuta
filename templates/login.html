<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ECORuta — Iniciar sesión</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0F6E56 0%, #1D9E75 45%, #5DCAA5 100%);
      font-family: system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before, body::after {
      content: '🌿';
      position: absolute;
      font-size: 160px;
      opacity: 0.08;
      pointer-events: none;
    }
    body::before { top: -30px; right: -20px; transform: rotate(30deg); }
    body::after  { bottom: -40px; left: -25px; transform: rotate(-20deg); font-size: 200px; }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1D9E75, #0F6E56);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .brand-name span { color: #1D9E75; }
    .brand-badge {
      margin-left: auto;
      background: #E1F5EE;
      color: #0F6E56;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .brand-tagline {
      font-size: 12px;
      color: #888;
      margin-left: 54px;
      margin-bottom: 1.5rem;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, #1D9E75, #5DCAA5, transparent);
      border-radius: 2px;
      margin-bottom: 1.75rem;
    }

    .welcome-title {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .welcome-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .mensaje {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 0 12px;
      height: 46px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-wrap:focus-within {
      border-color: #1D9E75;
      box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
    }
    .input-wrap .ico { font-size: 18px; opacity: 0.5; flex-shrink: 0; }
    .input-wrap input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: #1a1a1a;
      width: 100%;
    }
    .input-wrap input::placeholder { color: #bbb; }

    button[type="submit"] {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #1D9E75, #0F6E56);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
      transition: opacity 0.15s, transform 0.1s;
    }
    button[type="submit"]:hover  { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }

    .footer {
      margin-top: 1.5rem;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand-row">
      <div class="brand-icon">🌱</div>
      <div class="brand-name">ECO<span>Ruta</span></div>
      <span class="brand-badge">📍 San José del Rincón</span>
    </div>
    <div class="brand-tagline">Sistema de rutas de recolección</div>

    <div class="divider"></div>

    <div class="welcome-title">Bienvenido de nuevo 👋</div>
    <div class="welcome-sub">Inicia sesión para gestionar tus rutas</div>

    {% if error %}
      <p class="mensaje">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Usuario</label>
        <div class="input-wrap">
          <span class="ico">👤</span>
          <input type="text" name="username" placeholder="Tu usuario" required>
        </div>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <span class="ico">🔒</span>
          <input type="password" name="password" placeholder="Tu contraseña" required>
        </div>
      </div>

      <button type="submit">🌿 Iniciar sesión</button>
    </form>
  </div>

  <div class="footer">ECORuta 2026 — Grupo 405</div>

</body>
</html>
