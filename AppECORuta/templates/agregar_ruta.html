<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ECORuta — Agregar ruta</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="header">
    <h1>🌿 ECORuta — Agregar ruta</h1>
  </div>
  <div class="container">
    <h2>Nueva ruta de recolección</h2>
    {% if error %}<p class="mensaje-error">{{ error }}</p>{% endif %}
    <form method="POST">
      <label>Nombre de la ruta:</label>
      <input type="text" name="nombre" placeholder="Ej. Ruta A - Centro" required>
      <label>Zona:</label>
      <input type="text" name="zona" placeholder="Ej. Zona Centro" required>
      <label>Horario:</label>
      <input type="text" name="horario" placeholder="Ej. 06:00 - 08:00" required>
      <!-- Corrección #8: colonias y calles dentro de cada ruta -->
      <label>Colonias que atiende:</label>
      <input type="text" name="colonias" placeholder="Ej. Col. Hidalgo, Centro, Morelos" required>
      <label>Frecuencia de recolección:</label>
      <input type="text" name="frecuencia" placeholder="Ej. Lunes, Miércoles y Viernes">
      <label>Distancia aproximada (km):</label>
      <input type="number" step="0.1" name="distancia" placeholder="Ej. 12.5">
      <button type="submit">Guardar ruta</button>
    </form>
    <a class="back" href="/">← Volver al inicio</a>
  </div>
</body>
</html>
